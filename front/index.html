<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Live Auction (Frontend Only)</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="shell">
      <header class="topbar">
        <div class="brand">Live Auction</div>
        <div class="user-info" id="userInfo"></div>
        <div class="status" id="connStatus">Disconnected</div>
      </header>

      <main class="grid">
        <section class="card auth-card" id="authSection">
          <h2>Authentication</h2>
          <div class="tabs">
            <button class="tab active" data-tab="login">Login</button>
            <button class="tab" data-tab="register">Register</button>
          </div>
          
          <div class="tab-content" id="loginForm">
            <label>
              Email
              <input id="loginEmail" type="email" placeholder="email@example.com" />
            </label>
            <label>
              Password
              <input id="loginPassword" type="password" placeholder="Password" />
            </label>
            <button id="btnLogin">Login</button>
          </div>

          <div class="tab-content hidden" id="registerForm">
            <label>
              Name
              <input id="regName" type="text" placeholder="Your name" />
            </label>
            <label>
              Email
              <input id="regEmail" type="email" placeholder="email@example.com" />
            </label>
            <label>
              Password
              <input id="regPassword" type="password" placeholder="Password" />
            </label>
            <button id="btnRegister">Register</button>
          </div>
          <div class="message" id="authMessage"></div>
        </section>

        <section class="card hidden" id="mainAppSection">
          <section class="card">
            <h2>Auction Management</h2>
            <label>
              Admin Token
              <input id="adminTokenInput" placeholder="JWT token for admin" />
            </label>
            <button id="btnListAuctions">List Auctions</button>
            <div class="divider"></div>
            <h3>Create Auction</h3>
            <label>
              Title
              <input id="createTitleInput" placeholder="Auction title" />
            </label>
            <label>
              Description
              <input id="createDescInput" placeholder="Description" />
            </label>
            <label>
              Start Price
              <input id="createPriceInput" type="number" min="1" placeholder="100" />
            </label>
            <label>
              Duration (seconds)
              <input id="createDurationInput" type="number" min="60" placeholder="3600" />
            </label>
            <button id="btnCreateAuction">Create Auction</button>
            <div class="message" id="createMessage"></div>
            <div class="divider"></div>
            <label>
              Auction ID
              <input id="adminAuctionIdInput" placeholder="Auction ID" />
            </label>
            <div class="row">
              <button id="btnStartAuction">Start</button>
              <button id="btnEndAuction" class="danger">End</button>
            </div>
            <div class="message" id="adminMessage"></div>
            <div class="divider"></div>
            <h3>All Auctions</h3>
            <div class="joined-list" id="auctionsList"></div>
          </section>

          <section class="card">
            <h2>Join Auction</h2>
            <label>
              Auction ID
              <input id="auctionIdInput" placeholder="e.g. 64f2e1..." />
            </label>
            <label>
              Token
              <input id="tokenInput" placeholder="JWT token" />
            </label>
            <div class="row">
              <button id="btnConnect">Connect</button>
              <button id="btnJoin">Join</button>
            </div>
            <div class="divider"></div>
            <h3>Joined Auctions</h3>
            <div class="joined-list" id="joinedList"></div>
          </section>

          <section class="card">
            <h2>Current Status</h2>
            <div class="metric">
              <span>Selected Auction</span>
              <strong id="selectedAuction">-</strong>
            </div>
            <div class="metric">
              <span>Current Bid</span>
              <strong id="currentBid">$0</strong>
            </div>
            <div class="metric">
              <span>Highest Bidder</span>
              <strong id="currentBidder">-</strong>
            </div>
            <div class="metric">
              <span>Time Left</span>
              <strong id="timeLeft">-</strong>
            </div>
          </section>

          <section class="card">
            <h2>Place Bid</h2>
            <label>
              Select Auction
              <select id="auctionSelect">
                <option value="">Choose auction</option>
              </select>
            </label>
            <label>
              Amount
              <input id="bidAmountInput" type="number" min="1" step="1" />
            </label>
            <button id="btnBid">Place Bid</button>
            <div class="message" id="bidMessage"></div>
          </section>

          <section class="card log">
            <h2>Activity</h2>
            <div id="log"></div>
          </section>
        </section>
      </main>
    </div>

    <script src="app.js"></script>
  </body>
</html>
